name: Live distribution smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: live-distribution-smoke
  cancel-in-progress: false

jobs:
  live-channels:
    name: npm, Bun, Deno, and Nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: 2.9.3
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
      - run: npm ci
      - name: Resolve expected release
        id: release
        run: |
          echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"
      - name: Verify npm provenance, install, and CLI
        run: node scripts/verify-release.mjs "${{ steps.release.outputs.version }}"
      - name: Verify bunx and the Bun runtime
        working-directory: ${{ runner.temp }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          test "$(bunx "tokentopper@$VERSION" --version)" = "$VERSION"
          test "$(bunx --bun "tokentopper@$VERSION" --version)" = "$VERSION"
      - name: Verify Deno npm execution
        working-directory: ${{ runner.temp }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: test "$(deno run -A --minimum-dependency-age=0 "npm:tokentopper@$VERSION" --version)" = "$VERSION"
      - name: Verify tagged Nix flake
        working-directory: ${{ runner.temp }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: test "$(nix run "github:Kalmantic/tokentopper/tokentopper-v$VERSION" -- --version)" = "$VERSION"
