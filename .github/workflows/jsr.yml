name: Publish JSR

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    name: Publish @openfactoryai/tokentopper
    runs-on: ubuntu-latest
    environment: jsr
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm exec --yes --package=jsr@0.14.3 -- jsr publish
