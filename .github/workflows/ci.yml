name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm audit --audit-level=high

  package:
    name: Inspectable npm artifact
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run release:assets
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tokentopper-release-assets-${{ github.sha }}
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 7

  runtime-compatibility:
    name: Bun, Deno, and Nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: 2.9.3
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
      - run: npm ci
      - run: npm run build
      - name: Verify Bun executes the published bundle
        run: test "$(bun dist/cli.js --version)" = "$(node -p "require('./package.json').version")"
      - name: Verify Deno executes source and bundle
        run: |
          test "$(deno run -A src/cli.ts --version)" = "$(node -p "require('./package.json').version")"
          test "$(deno run -A dist/cli.js --version)" = "$(node -p "require('./package.json').version")"
          deno check src/mod.ts
      - name: Validate the JSR package
        run: |
          output="$(npm exec --yes --package=jsr@0.14.3 -- jsr publish --dry-run 2>&1)"
          printf '%s\n' "$output"
          ! grep -Fq 'warning[unanalyzable-dynamic-import]' <<< "$output"
      - name: Verify the Nix package and app
        run: |
          nix flake check --print-build-logs
          test "$(nix run . -- --version)" = "$(node -p "require('./package.json').version")"

  standalone-prototype:
    name: Standalone prototype / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: npm ci
      - name: Build native standalone prototype
        shell: bash
        run: |
          binary="$(npm run --silent standalone:build)"
          test -n "$binary"
          echo "binary=$binary" >> "$GITHUB_OUTPUT"
        id: build
      - name: Verify parsers, local files, signing, skills, and mocked sync
        run: npm run standalone:check -- "${{ steps.build.outputs.binary }}"
      - name: Package archive, manifest, checksum, and SBOM
        shell: bash
        run: |
          archive="$(npm run --silent standalone:package -- '${{ steps.build.outputs.binary }}')"
          test -n "$archive"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
        id: package
      - name: Verify clean archive extraction and runtime behavior
        run: npm run standalone:archive-check -- "${{ steps.package.outputs.archive }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: standalone-prototype-${{ matrix.os }}-${{ github.sha }}
          path: |
            standalone-artifacts/*.tar.gz
            standalone-artifacts/*.zip
            standalone-artifacts/*.sha256
            standalone-artifacts/*.manifest.json
            standalone-artifacts/*.cdx.json
          if-no-files-found: error
          retention-days: 3

  attest-standalone:
    name: Attest standalone archives
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: standalone-prototype
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: standalone-prototype-*-${{ github.sha }}
          path: attestation-subjects
          merge-multiple: true
      - name: Require exactly three platform archives
        shell: bash
        run: |
          shopt -s nullglob
          archives=(attestation-subjects/*.tar.gz attestation-subjects/*.zip)
          test "${#archives[@]}" -eq 3
          printf '%s\n' "${archives[@]}"
      - name: Create keyless SLSA build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            attestation-subjects/*.tar.gz
            attestation-subjects/*.zip
      - name: Verify repository provenance
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          for archive in attestation-subjects/*.tar.gz attestation-subjects/*.zip; do
            gh attestation verify "$archive" --repo "$GITHUB_REPOSITORY"
          done

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
