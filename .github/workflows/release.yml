name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      operation:
        description: Release operation
        required: true
        default: recover-stable
        type: choice
        options:
          - recover-stable
          - publish-next
      tag:
        description: Existing immutable tokentopper-v<version> tag
        required: true
        type: string
      version:
        description: Exact package version at the tag
        required: true
        type: string

permissions: {}

jobs:
  release-please:
    name: Prepare or create release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      release-sha: ${{ steps.release.outputs.sha }}
      release-tag: ${{ steps.release.outputs.tag_name }}
      release-version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

  publish:
    name: Publish npm package
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.release-sha }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use the pinned npm CLI
        run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npm run check
      - name: Confirm release and package versions match
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: node -e "const p=require('./package.json'); if(p.version!==process.env.RELEASE_VERSION) throw new Error(p.version+' != '+process.env.RELEASE_VERSION)"
      - name: Publish to npm with trusted publishing
        run: npm publish --access public --provenance
      - name: Verify the public release
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: node scripts/verify-release.mjs "$RELEASE_VERSION"

  release-assets:
    name: Attach verified release assets
    needs: [release-please, publish]
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.release-sha }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npm run check
      - name: Build tarball, checksum, and SBOM
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: npm run release:assets -- "$RELEASE_VERSION"
      - name: Attach assets to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-please.outputs.release-tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/*
      - name: Verify public GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: node scripts/verify-github-release-assets.mjs "$RELEASE_VERSION"

  update-nix-mirror:
    name: Prepare Nix mirror update
    needs: [release-please, release-assets]
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: NixOS/nixpkgs
          ref: master
          path: .nixpkgs
          fetch-depth: 1
          filter: blob:none
          persist-credentials: false
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
      - name: Validate the stable release version
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: |
          node -e "if(!/^\\d+\\.\\d+\\.\\d+$/.test(process.env.RELEASE_VERSION)) throw new Error('not a stable SemVer: '+process.env.RELEASE_VERSION)"
      - name: Compute the Nix source and dependency hashes
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: |
          package_path=".nixpkgs/pkgs/by-name/to/tokentopper/package.nix"
          mkdir -p "$(dirname "$package_path")"
          cp nix/nixpkgs-package.nix "$package_path"
          (
            cd .nixpkgs
            nix shell --extra-experimental-features "nix-command flakes" path:.#nix-update \
              -c nix-update --version="$RELEASE_VERSION" tokentopper
          )
          cp "$package_path" nix/nixpkgs-package.nix
          grep -Fxe "  version = \"$RELEASE_VERSION\";" nix/nixpkgs-package.nix
          if grep -Eq 'lib\\.fake(Hash|Sha256)|sha256-AAAA' nix/nixpkgs-package.nix; then
            echo "nix-update left a placeholder hash" >&2
            exit 1
          fi
      - name: Require a sandboxed build
        run: nix config show sandbox | grep -Fx 'true'
      - name: Build and smoke test the updated package
        run: |
          nix-instantiate .nixpkgs -A tokentopper >/dev/null
          output="$(nix-build .nixpkgs -A tokentopper --no-out-link)"
          test "$("$output/bin/tokentopper" --version)" = "${{ needs.release-please.outputs.release-version }}"
          nix-build .nixpkgs -A tokentopper.tests.smoke --no-out-link
      - name: Detect a mirror change
        id: change
        run: |
          if git diff --quiet -- nix/nixpkgs-package.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "The Nix mirror already represents this release." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open or refresh the Nix mirror pull request
        if: steps.change.outputs.changed == 'true'
        env:
          BRANCH: automation/nix-${{ needs.release-please.outputs.release-version }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add nix/nixpkgs-package.nix
          git commit -m "build(nix): update tokentopper to $RELEASE_VERSION"
          gh auth setup-git

          remote_sha="$(git ls-remote --heads origin "refs/heads/$BRANCH" | awk '{print $1}')"
          if test -n "$remote_sha"; then
            git push --force-with-lease="refs/heads/$BRANCH:$remote_sha" origin "HEAD:refs/heads/$BRANCH"
          else
            git push --set-upstream origin "$BRANCH"
          fi

          existing_url="$(gh pr list --state open --head "$BRANCH" --json url --jq '.[0].url // empty')"
          if test -n "$existing_url"; then
            echo "Refreshed $existing_url" >> "$GITHUB_STEP_SUMMARY"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "build(nix): update tokentopper to $RELEASE_VERSION" \
              --body "Automated follow-up to the verified npm and GitHub release. The source and npm dependency hashes were computed with nix-update, followed by a sandboxed build and CLI smoke test."
          fi

  recover-release:
    name: Recover npm publish and release assets
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'recover-stable'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use the pinned npm CLI
        run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npm run check
      - name: Confirm requested and package versions match
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: node -e "const p=require('./package.json'); if(p.version!==process.env.RELEASE_VERSION) throw new Error(p.version+' != '+process.env.RELEASE_VERSION)"
      - name: Check whether the version is published
        id: registry
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if npm view "tokentopper@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm with trusted publishing
        if: steps.registry.outputs.published != 'true'
        run: npm publish --access public --provenance
      - name: Check out current release verification tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          path: .release-tooling
      - name: Verify the public release
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: node .release-tooling/scripts/verify-release.mjs "$RELEASE_VERSION"
      - name: Build tarball, checksum, and SBOM
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: npm run release:assets -- "$RELEASE_VERSION"
      - name: Attach verified release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
      - name: Verify public GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: node .release-tooling/scripts/verify-github-release-assets.mjs "$RELEASE_VERSION"

  publish-prerelease:
    name: Publish npm prerelease to next
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'publish-next'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use the pinned npm CLI
        run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npm run check
      - name: Confirm the immutable tag contains the requested prerelease
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node --input-type=module <<'NODE'
          import assert from "node:assert/strict";
          import packageJson from "./package.json" with { type: "json" };
          import packageLock from "./package-lock.json" with { type: "json" };
          import jsr from "./jsr.json" with { type: "json" };
          const version = process.env.RELEASE_VERSION;
          assert.match(version, /^\d+\.\d+\.\d+-[0-9A-Za-z][0-9A-Za-z.-]*$/, "publish-next requires a prerelease version");
          assert.equal(process.env.RELEASE_TAG, `tokentopper-v${version}`, "tag must exactly match the prerelease version");
          assert.equal(packageJson.version, version, "package.json version mismatch");
          assert.equal(packageLock.version, version, "package-lock.json version mismatch");
          assert.equal(packageLock.packages?.[""]?.version, version, "package-lock root version mismatch");
          assert.equal(jsr.version, version, "jsr.json version mismatch");
          NODE
          test "$(git describe --tags --exact-match)" = "$RELEASE_TAG"
      - name: Inspect registry state without changing latest
        id: registry
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          latest="$(npm view tokentopper dist-tags.latest)"
          node -e "if(!/^\d+\.\d+\.\d+$/.test(process.argv[1])) throw new Error('latest is not a stable version: '+process.argv[1])" "$latest"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if npm view "tokentopper@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm next with trusted publishing
        if: steps.registry.outputs.published != 'true'
        run: npm publish --access public --provenance --tag next
      - name: Check out current release verification tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          path: .release-tooling
      - name: Verify next and prove latest was preserved
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          STABLE_VERSION: ${{ steps.registry.outputs.latest }}
        run: node .release-tooling/scripts/verify-release.mjs "$RELEASE_VERSION" --tag next --preserve-latest "$STABLE_VERSION"
      - name: Create or validate the GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            test "$(gh release view "$RELEASE_TAG" --json isPrerelease --jq .isPrerelease)" = "true"
          else
            gh release create "$RELEASE_TAG" --prerelease --verify-tag --title "tokentopper: v$RELEASE_VERSION" --generate-notes
          fi
      - name: Build tarball, checksum, and SBOM
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: npm run release:assets -- "$RELEASE_VERSION"
      - name: Attach verified prerelease assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
      - name: Verify public GitHub prerelease assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: node .release-tooling/scripts/verify-github-release-assets.mjs "$RELEASE_VERSION"
