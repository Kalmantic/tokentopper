name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    name: Prepare or create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      release-sha: ${{ steps.release.outputs.sha }}
      release-tag: ${{ steps.release.outputs.tag_name }}
      release-version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

  publish:
    name: Publish npm package
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.release-please.outputs.release-sha }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Use the pinned npm CLI
        run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npm run check
      - name: Confirm release and package versions match
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: node -e "const p=require('./package.json'); if(p.version!==process.env.RELEASE_VERSION) throw new Error(p.version+' != '+process.env.RELEASE_VERSION)"
      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}
        run: npm publish --access public --provenance
      - name: Verify the public release
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: node scripts/verify-release.mjs "$RELEASE_VERSION"

  release-assets:
    name: Attach verified release assets
    needs: [release-please, publish]
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.release-please.outputs.release-sha }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
      - run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npm run check
      - name: Build tarball, checksum, and SBOM
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: npm run release:assets -- "$RELEASE_VERSION"
      - name: Attach assets to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-please.outputs.release-tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/*
