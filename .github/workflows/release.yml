name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      operation:
        description: Release operation
        required: true
        default: recover-stable
        type: choice
        options:
          - recover-stable
          - publish-next
      tag:
        description: Existing immutable tokentopper-v<version> tag
        required: true
        type: string
      version:
        description: Exact package version at the tag
        required: true
        type: string

permissions: {}

jobs:
  release-please:
    name: Prepare or create release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      release-sha: ${{ steps.release.outputs.sha }}
      release-tag: ${{ steps.release.outputs.tag_name }}
      release-version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

  publish:
    name: Publish npm package
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.release-sha }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Use the pinned npm CLI
        run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npm run check
      - name: Confirm release and package versions match
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: node -e "const p=require('./package.json'); if(p.version!==process.env.RELEASE_VERSION) throw new Error(p.version+' != '+process.env.RELEASE_VERSION)"
      - name: Publish to npm with trusted publishing
        run: npm publish --access public --provenance
      - name: Verify the public release
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: node scripts/verify-release.mjs "$RELEASE_VERSION"

  release-assets:
    name: Attach verified release assets
    needs: [release-please, publish]
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.release-sha }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npm run check
      - name: Build tarball, checksum, and SBOM
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: npm run release:assets -- "$RELEASE_VERSION"
      - name: Attach assets to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-please.outputs.release-tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/*
      - name: Verify public GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.release-version }}
        run: node scripts/verify-github-release-assets.mjs "$RELEASE_VERSION"

  recover-release:
    name: Recover npm publish and release assets
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'recover-stable'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Use the pinned npm CLI
        run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npm run check
      - name: Confirm requested and package versions match
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: node -e "const p=require('./package.json'); if(p.version!==process.env.RELEASE_VERSION) throw new Error(p.version+' != '+process.env.RELEASE_VERSION)"
      - name: Check whether the version is published
        id: registry
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if npm view "tokentopper@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm with trusted publishing
        if: steps.registry.outputs.published != 'true'
        run: npm publish --access public --provenance
      - name: Check out current release verification tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          path: .release-tooling
      - name: Verify the public release
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: node .release-tooling/scripts/verify-release.mjs "$RELEASE_VERSION"
      - name: Build tarball, checksum, and SBOM
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: npm run release:assets -- "$RELEASE_VERSION"
      - name: Attach verified release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
      - name: Verify public GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: node .release-tooling/scripts/verify-github-release-assets.mjs "$RELEASE_VERSION"

  publish-prerelease:
    name: Publish npm prerelease to next
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'publish-next'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use the pinned npm CLI
        run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npm run check
      - name: Confirm the immutable tag contains the requested prerelease
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node --input-type=module <<'NODE'
          import assert from "node:assert/strict";
          import packageJson from "./package.json" with { type: "json" };
          import packageLock from "./package-lock.json" with { type: "json" };
          import jsr from "./jsr.json" with { type: "json" };
          const version = process.env.RELEASE_VERSION;
          assert.match(version, /^\d+\.\d+\.\d+-[0-9A-Za-z][0-9A-Za-z.-]*$/, "publish-next requires a prerelease version");
          assert.equal(process.env.RELEASE_TAG, `tokentopper-v${version}`, "tag must exactly match the prerelease version");
          assert.equal(packageJson.version, version, "package.json version mismatch");
          assert.equal(packageLock.version, version, "package-lock.json version mismatch");
          assert.equal(packageLock.packages?.[""]?.version, version, "package-lock root version mismatch");
          assert.equal(jsr.version, version, "jsr.json version mismatch");
          NODE
          test "$(git describe --tags --exact-match)" = "$RELEASE_TAG"
      - name: Inspect registry state without changing latest
        id: registry
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          latest="$(npm view tokentopper dist-tags.latest)"
          node -e "if(!/^\d+\.\d+\.\d+$/.test(process.argv[1])) throw new Error('latest is not a stable version: '+process.argv[1])" "$latest"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if npm view "tokentopper@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm next with trusted publishing
        if: steps.registry.outputs.published != 'true'
        run: npm publish --access public --provenance --tag next
      - name: Check out current release verification tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          path: .release-tooling
      - name: Verify next and prove latest was preserved
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          STABLE_VERSION: ${{ steps.registry.outputs.latest }}
        run: node .release-tooling/scripts/verify-release.mjs "$RELEASE_VERSION" --tag next --preserve-latest "$STABLE_VERSION"
      - name: Create or validate the GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            test "$(gh release view "$RELEASE_TAG" --json isPrerelease --jq .isPrerelease)" = "true"
          else
            gh release create "$RELEASE_TAG" --prerelease --verify-tag --title "tokentopper: v$RELEASE_VERSION" --generate-notes
          fi
      - name: Build tarball, checksum, and SBOM
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: npm run release:assets -- "$RELEASE_VERSION"
      - name: Attach verified prerelease assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
      - name: Verify public GitHub prerelease assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: node .release-tooling/scripts/verify-github-release-assets.mjs "$RELEASE_VERSION"
